<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Enzo Dev</title>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#070b14;
border-bottom:1px solid #1c2030;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
padding:10px 16px;
background:#111624;
border-radius:20px;
cursor:pointer;
}

.tab.active{
background:#5865F2;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.section{display:none;}
.section.active{display:block;}

.card{
background:#111624;
padding:20px;
border-radius:12px;
margin-bottom:10px;
}

.review{
background:#111624;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
}

.review-header{
display:flex;
gap:10px;
align-items:center;
}

.stars span{
font-size:24px;
cursor:pointer;
opacity:0.4;
}

.stars span.active{
opacity:1;
}

button{
background:#5865F2;
border:none;
padding:10px 15px;
border-radius:8px;
color:white;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

textarea{
width:100%;
height:100px;
border-radius:8px;
border:none;
margin-top:10px;
padding:10px;
background:#0b0f1a;
color:white;
}

</style>

</head>

<body>

<header>

<h2>Enzo Dev</h2>

<div class="tabs">

<div class="tab active" onclick="show('home',this)">Bienvenue</div>
<div class="tab" onclick="show('fivem',this)">FiveM</div>
<div class="tab" onclick="show('sites',this)">Sites</div>
<div class="tab" onclick="show('discord',this)">Discord</div>
<div class="tab" onclick="show('avis',this)">Avis</div>

</div>

</header>

<div class="container">

<div id="home" class="section active">

<div class="card">
<h3>Bienvenue</h3>
<p>Développement FiveM, sites web et Discord.</p>
</div>

</div>

<div id="fivem" class="section">

<div class="card">
Scripts ESX / Standalone
</div>

</div>

<div id="sites" class="section">

<div class="card">
Création de sites web modernes.
</div>

</div>

<div id="discord" class="section">

<div class="card">
Bots Discord, tickets, rôles auto.
</div>

</div>

<div id="avis" class="section">

<button id="login">Connexion Discord</button>
<button id="logout" style="display:none">Déconnexion</button>

<div id="user"></div>

<div id="form" style="display:none">

<div class="stars" id="stars">

<span data-v="1">⭐</span>
<span data-v="2">⭐</span>
<span data-v="3">⭐</span>
<span data-v="4">⭐</span>
<span data-v="5">⭐</span>

</div>

<textarea id="message"></textarea>

<button id="send">Publier</button>

</div>

<div id="reviews"></div>

</div>

</div>

<script>

function show(id,el){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

}

</script>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://xbqvikovspdkxbncnhlq.supabase.co",
"COLLE_TA_CLE_ANON_PUBLIC"
)

const loginBtn=document.getElementById("login")
const logoutBtn=document.getElementById("logout")
const userDiv=document.getElementById("user")
const form=document.getElementById("form")
const list=document.getElementById("reviews")
const message=document.getElementById("message")

let rating=5
let editing=null

const stars=document.querySelectorAll("#stars span")

stars.forEach(s=>{
s.onclick=()=>{
rating=Number(s.dataset.v)
stars.forEach(st=>st.classList.remove("active"))
for(let i=0;i<rating;i++)stars[i].classList.add("active")
}
})

async function getUser(){

const {data:{session}}=await supabase.auth.getSession()

if(!session)return null

return session.user

}

async function refresh(){

const user=await getUser()

if(!user){

loginBtn.style.display="block"
logoutBtn.style.display="none"
form.style.display="none"
userDiv.innerText=""

}else{

loginBtn.style.display="none"
logoutBtn.style.display="block"
form.style.display="block"

userDiv.innerText="Connecté"

}

}

async function loadReviews(){

const {data}=await supabase
.from("reviews")
.select("*")
.order("created_at",{ascending:false})

list.innerHTML=""

data.forEach(r=>{

const div=document.createElement("div")
div.className="review"

div.innerHTML=`

<div class="review-header">

${r.discord_avatar_url?`<img class="avatar" src="${r.discord_avatar_url}">`:``}

<b>${r.discord_username}</b>

</div>

<div>${"⭐".repeat(r.rating)}</div>

<p>${r.message}</p>

<button class="edit" data-id="${r.id}">Modifier</button>
<button class="delete" data-id="${r.id}">Supprimer</button>

`

list.appendChild(div)

})

document.querySelectorAll(".edit").forEach(b=>{
b.onclick=async()=>{
editing=b.dataset.id
}
})

document.querySelectorAll(".delete").forEach(b=>{
b.onclick=async()=>{

await supabase
.from("reviews")
.delete()
.eq("id",b.dataset.id)

loadReviews()

}
})

}

loginBtn.onclick=async()=>{

await supabase.auth.signInWithOAuth({
provider:"discord"
})

}

logoutBtn.onclick=async()=>{

await supabase.auth.signOut()

refresh()

}

document.getElementById("send").onclick=async()=>{

const user=await getUser()

if(!user)return

if(editing){

await supabase
.from("reviews")
.update({
message:message.value,
rating
})
.eq("id",editing)

editing=null

}else{

await supabase
.from("reviews")
.insert({
user_id:user.id,
discord_username:user.user_metadata.name,
discord_avatar_url:user.user_metadata.avatar_url,
message:message.value,
rating
})

}

message.value=""

loadReviews()

}

supabase.auth.onAuthStateChange(()=>{
refresh()
loadReviews()
})

refresh()
loadReviews()

</script>

</body>
</html>
