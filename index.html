<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enzo Dev — FiveM, Sites & Discord</title>
  <meta name="description" content="Enzo Dev : développement FiveM (ESX/Standalone), création de sites et bots Discord. Avis publics." />

  <style>
    :root{
      --bg0:#060816;
      --bg1:#0a1030;
      --glass:rgba(10,14,32,.58);
      --glass2:rgba(10,14,32,.42);
      --line:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.70);
      --txt:rgba(255,255,255,.92);

      --a1:#5865F2;
      --a2:#8b5cf6;
      --a3:#22c55e;
      --danger:#ef4444;

      --r1:22px;
      --r2:16px;

      --shadow: 0 26px 85px rgba(0,0,0,.60);
      --shadow2: 0 18px 45px rgba(0,0,0,.45);
      --shadow3: 0 10px 25px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--txt);
      min-height:100vh;
      overflow-x:hidden;

      background:
        radial-gradient(900px 520px at 18% 12%, rgba(88,101,242,.22), transparent 60%),
        radial-gradient(900px 520px at 82% 10%, rgba(139,92,246,.18), transparent 60%),
        radial-gradient(900px 520px at 40% 100%, rgba(0,0,0,.55), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      position:relative;
    }

    /* Fond plein écran par catégorie */
    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(1000px 800px at 20% 25%, rgba(88,101,242,.22), transparent 60%),
        radial-gradient(900px 700px at 80% 25%, rgba(139,92,246,.18), transparent 60%),
        linear-gradient(rgba(0,0,0,.60), rgba(0,0,0,.78)),
        url("banner.png");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      filter:saturate(1.07) contrast(1.07);
      z-index:-2;
      transition:.35s ease;
    }
    body::after{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(600px 420px at 20% 20%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(800px 520px at 70% 65%, rgba(255,255,255,.04), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.62));
      z-index:-1;
      pointer-events:none;
    }

    .wrap{max-width:1120px;margin:0 auto;padding:18px}

    /* Topbar */
    .topbar{
      position:sticky; top:0; z-index:60;
      padding:12px 0;
      backdrop-filter: blur(14px);
      background: rgba(7,9,20,.60);
      border-bottom:1px solid var(--line);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.2px}
    .badge{
      width:40px;height:40px;border-radius:14px;
      background:linear-gradient(135deg,#f59e0b,var(--a1));
      box-shadow:0 16px 30px rgba(0,0,0,.45);
      position:relative; overflow:hidden;
    }
    .badge::after{
      content:"";
      position:absolute; inset:-30%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      transform: rotate(15deg);
      animation: shine 3.2s infinite;
    }
    @keyframes shine{
      0%{transform:translateX(-80%) rotate(15deg);opacity:.0}
      20%{opacity:.55}
      60%{opacity:.0}
      100%{transform:translateX(80%) rotate(15deg);opacity:.0}
    }

    .brand .t1{font-size:16px}
    .brand small{display:block;color:var(--muted);font-weight:700;margin-top:2px}

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }
    .tab{
      padding:10px 14px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.28);
      cursor:pointer; user-select:none;
      font-weight:900;
      transition:.15s ease;
      display:inline-flex; align-items:center; gap:8px;
    }
    .tab:hover{transform:translateY(-1px);background:rgba(255,255,255,.06)}
    .tab.active{
      background:linear-gradient(135deg,var(--a1),var(--a2));
      border-color:transparent;
      box-shadow:0 14px 30px rgba(88,101,242,.22);
    }

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 14px;border-radius:12px;
      border:1px solid transparent;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      color:#fff;text-decoration:none;
      font-weight:900;cursor:pointer;
      transition:.15s ease;
      box-shadow:0 14px 30px rgba(88,101,242,.18);
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
    .btn.secondary{
      background:rgba(0,0,0,.28);
      border-color:var(--line);
      box-shadow:none;
    }
    .btn.danger{
      background:rgba(239,68,68,.16);
      border-color:rgba(239,68,68,.35);
      box-shadow:none;
    }

    /* Mobile: bouton menu */
    .hamburger{
      display:none;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.28);
      cursor:pointer;
      font-weight:900;
    }

    @media (max-width: 820px){
      .tabs{display:none;width:100%}
      .tabs.open{display:flex}
      .hamburger{display:inline-flex}
    }

    /* Stage */
    .stage{
      margin-top:18px;
      border-radius:var(--r1);
      border:1px solid var(--line);
      background:var(--glass);
      backdrop-filter: blur(18px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero{
      position:relative;
      border-bottom:1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(0,0,0,.72), rgba(0,0,0,.12)),
        url("banner.png");
      background-size:cover;
      background-position:center;
      padding:26px;
      min-height:190px;
      display:flex; align-items:flex-end;
    }

    .hero h1{
      font-size:44px;
      line-height:1.06;
      letter-spacing:-.6px;
      text-shadow: 0 12px 30px rgba(0,0,0,.55);
    }
    .hero p{
      color:rgba(255,255,255,.88);
      max-width:920px;
      line-height:1.55;
      margin-top:10px;
    }
    .pill{
      margin-top:14px;
      display:inline-flex;align-items:center;gap:9px;
      padding:8px 11px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.30);
      color:var(--muted);
      font-weight:850;font-size:13px;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--a3); box-shadow:0 0 14px rgba(34,197,94,.55)}

    .content{padding:16px}
    .section{display:none}
    .section.active{display:block;animation: fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:.0; transform:translateY(6px)}to{opacity:1; transform:translateY(0)}}

    .grid{display:grid;gap:12px;margin-top:12px}
    @media (min-width:900px){ .grid{grid-template-columns:1fr 1fr 1fr} }

    .card{
      border-radius:var(--r2);
      border:1px solid var(--line);
      background:rgba(0,0,0,.24);
      backdrop-filter: blur(10px);
      padding:16px;
      box-shadow:var(--shadow2);
      min-height:112px;
      transition:.15s ease;
    }
    .card:hover{transform:translateY(-2px); box-shadow: var(--shadow)}
    .card h3{margin-bottom:8px}
    .card p{color:rgba(255,255,255,.82);line-height:1.6}

    .actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .muted{color:var(--muted)}

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:#fff;
      outline:none;
      font-family:inherit;
      transition:.15s ease;
    }
    textarea:focus{border-color:rgba(88,101,242,.55); box-shadow:0 0 0 4px rgba(88,101,242,.12)}

    .reviews{margin-top:12px;display:grid;gap:12px}
    .review{
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      padding:14px;
      box-shadow: var(--shadow3);
    }

    .review-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .user{display:flex;align-items:center;gap:10px}
    .avatar{
      width:38px;height:38px;border-radius:999px;object-fit:cover;
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 10px 18px rgba(0,0,0,.35);
    }

    /* ⭐ étoiles animées (display) */
    .stars-display{
      display:inline-flex; gap:2px; align-items:center;
      font-size:16px;
      letter-spacing:0;
    }
    .stars-display span{
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
      opacity:.95;
    }
    .stars-display .empty{opacity:.35}

    /* ⭐ sélecteur animé */
    .stars-picker{
      display:flex; gap:8px; align-items:center;
      margin-top:6px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.20);
      width:max-content;
    }
    .star-btn{
      font-size:30px;
      cursor:pointer;
      user-select:none;
      transform-origin:center;
      opacity:.35;
      transition: transform .12s ease, opacity .12s ease, filter .12s ease;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,.25));
    }
    .star-btn:hover{transform:translateY(-2px) scale(1.05); opacity:1}
    .star-btn.on{opacity:1}
    .star-btn.pop{animation: pop .18s ease}
    @keyframes pop{
      0%{transform:scale(.94)}
      70%{transform:scale(1.10)}
      100%{transform:scale(1)}
    }

    .review p{margin-top:10px;color:rgba(255,255,255,.86);line-height:1.62;white-space:pre-wrap}
    .review-actions{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}

  <script>
    const CONFIG = {
      discordInvite: "https://discord.gg/FXF3v4YRRr",
      backgrounds: {
        bienvenue: "banner.png",
        fivem: "fivem-logo.png",
        sites: "banner.png",
        discord: "discord-logo.png",
        avis: "banner.png"
      }
    };

    document.getElementById("contactBtn").href = CONFIG.discordInvite;
    document.getElementById("discordBtn1").href = CONFIG.discordInvite;
    document.getElementById("discordBtn2").href = CONFIG.discordInvite;
    document.getElementById("discordBtnSites").href = CONFIG.discordInvite;

    const heroTitle = document.getElementById("heroTitle");
    const heroDesc  = document.getElementById("heroDesc");
    const heroPill  = document.getElementById("heroPill");

    const bgStyle = document.createElement("style");
    document.head.appendChild(bgStyle);

    function setBg(section){
      const img = (CONFIG.backgrounds[section] || CONFIG.backgrounds.bienvenue);
      bgStyle.textContent = `body::before{background:
        radial-gradient(1000px 800px at 20% 25%, rgba(88,101,242,.22), transparent 60%),
        radial-gradient(900px 700px at 80% 25%, rgba(139,92,246,.18), transparent 60%),
        linear-gradient(rgba(0,0,0,.60), rgba(0,0,0,.78)),
        url("${img}");
        background-size:cover;background-position:center;background-attachment:fixed;}`;

      if(section==="bienvenue"){
        heroTitle.textContent="Bienvenue";
        heroDesc.textContent="Développement FiveM (ESX/Standalone), création de sites et Discord. Les avis sont publics.";
        heroPill.textContent="Choisis une catégorie pour commencer";
      }
      if(section==="fivem"){
        heroTitle.textContent="Développement FiveM";
        heroDesc.textContent="Scripts ESX / Standalone, optimisation, UI, logs… Un serveur propre, stable et pro.";
        heroPill.textContent="ESX / Standalone (pas de QBCore)";
      }
      if(section==="sites"){
        heroTitle.textContent="Création de sites";
        heroDesc.textContent="Site vitrine moderne, animations, mobile parfait, déploiement GitHub Pages.";
        heroPill.textContent="Design propre & rapide";
      }
      if(section==="discord"){
        heroTitle.textContent="Développement Discord";
        heroDesc.textContent="Bots, tickets, rôles automatiques, anti-raid… pour un Discord propre.";
        heroPill.textContent="Bots / config / sécurité";
      }
      if(section==="avis"){
        heroTitle.textContent="Avis & retours";
        heroDesc.textContent="Les avis sont visibles par tous. Connecte-toi uniquement pour publier/modifier.";
        heroPill.textContent="Avis publics";
      }
    }

    function show(section, el){
      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(section).classList.add("active");

      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      if(el) el.classList.add("active");
      else{
        const tab = document.querySelector(`.tab[data-id="${section}"]`);
        if(tab) tab.classList.add("active");
      }

      setBg(section);
      window.scrollTo({top:0,behavior:"smooth"});
    }

    // menu mobile
    const burger = document.getElementById("burger");
    const tabs = document.getElementById("tabs");
    burger?.addEventListener("click", ()=>{
      tabs.classList.toggle("open");
    });

    (function init(){
      document.getElementById("year").textContent = new Date().getFullYear();
      setBg("bienvenue");
    })();
  </script>

    const messageEl = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    // Stars animated picker
    let ratingValue = 5;
    const starBtns = document.querySelectorAll("#starsPicker .star-btn");
    function paintStars(v){
      starBtns.forEach(s=>{
        const on = Number(s.dataset.v) <= v;
        s.classList.toggle("on", on);
      });
    }
    function popStar(el){
      el.classList.remove("pop");
      void el.offsetWidth;
      el.classList.add("pop");
    }
    starBtns.forEach(s=>{
      s.addEventListener("click", ()=>{
        ratingValue = Number(s.dataset.v);
        paintStars(ratingValue);
        popStar(s);
      });
    });
    paintStars(5);

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // EDIT MODE
    let editingId = null;

    function setEditMode(on, review){
      if(!on){
        editingId = null;
        formTitle.textContent = "Publier un avis";
        sendBtn.textContent = "Publier";
        cancelEditBtn.style.display = "none";
        messageEl.value = "";
        ratingValue = 5;
        paintStars(5);
        return;
      }
      editingId = review.id;
      formTitle.textContent = "Modifier ton avis";
      sendBtn.textContent = "Mettre à jour";
      cancelEditBtn.style.display = "inline-flex";
      messageEl.value = review.message || "";
      ratingValue = Number(review.rating || 5);
      paintStars(ratingValue);
      form.scrollIntoView({ behavior:"smooth", block:"start" });
    }

    cancelEditBtn.addEventListener("click", ()=> setEditMode(false));

    async function getSession(){
      const { data: { session } } = await supabase.auth.getSession();
      return session || null;
    }

    // récupère username + avatar depuis user_metadata (plus fiable)
    async function getMe(){
      const session = await getSession();
      if(!session) return null;
      const user = session.user;

      const username =
        user.user_metadata?.full_name ||
        user.user_metadata?.name ||
        user.user_metadata?.user_name ||
        user.user_metadata?.preferred_username ||
        "Discord user";

      const avatar =
        user.user_metadata?.avatar_url ||
        user.user_metadata?.picture ||
        "";

      return { user, username, avatar };
    }

    async function refreshSession(){
      const meInfo = await getMe();

      if(!meInfo){
        me.textContent = "Tu peux lire les avis sans connexion. Connecte-toi seulement pour publier/modifier.";
        loginBtn.style.display = "inline-flex";
        logoutBtn.style.display = "none";
        form.style.display = "none";
        adminPanel.style.display = "none";
        hint.textContent = "";
        setEditMode(false);
        return { logged:false, isAdmin:false, myUserId:null };
      }

      me.innerHTML = `Connecté en <b>${escapeHtml(meInfo.username)}</b> — tu peux publier/modifier ton avis.`;
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-flex";
      form.style.display = "block";

      // admin ?
      const uid = meInfo.user.id;
      const res = await supabase.from("admins").select("user_id").eq("user_id", uid).maybeSingle();
      const isAdmin = !!res.data;
      adminPanel.style.display = isAdmin ? "block" : "none";
      hint.textContent = isAdmin ? "Admin: tu peux supprimer des avis." : "";

      return { logged:true, isAdmin, myUserId: uid, ...meInfo };
    }

    function starsDisplay(rating){
      const full = "⭐".repeat(rating);
      const empty = "☆".repeat(5 - rating);
      const fullHtml = full.split("").map(()=>`<span>⭐</span>`).join("");
      const emptyHtml = empty.split("").map(()=>`<span class="empty">☆</span>`).join("");
      return `<div class="stars-display">${fullHtml}${emptyHtml}</div>`;
    }

    async function loadReviews(){
      const { data, error } = await supabase
        .from("reviews")
        .select("*")
        .order("created_at", { ascending:false });

      if(error){
        list.innerHTML = `<div class="muted">Erreur: ${escapeHtml(error.message)}</div>`;
        return;
      }

      const sessionState = await refreshSession();
      list.innerHTML = "";

      if(!data?.length){
        list.innerHTML = `<div class="muted">Aucun avis pour le moment.</div>`;
        return;
      }

      for(const r of data){
        const d = new Date(r.created_at).toLocaleString("fr-FR");
        const isMine = sessionState.logged && (r.user_id === sessionState.myUserId);

        const div = document.createElement("div");
        div.className = "review";
        div.innerHTML = `
          <div class="review-top">
            <div class="user">
              ${r.discord_avatar_url ? `<img class="avatar" src="${escapeHtml(r.discord_avatar_url)}" alt="avatar">` : ""}
              <div>
                <div><b>${escapeHtml(r.discord_username)}</b></div>
                <div class="muted" style="font-size:12px">${escapeHtml(d)}</div>
              </div>
            </div>
            ${starsDisplay(Number(r.rating || 5))}
          </div>

          <p>${escapeHtml(r.message)}</p>

          <div class="review-actions">
            ${isMine ? `<button class="btn secondary" data-edit="${r.id}">✏️ Modifier</button>` : ``}
            ${sessionState.isAdmin ? `<button class="btn danger" data-del="${r.id}">Supprimer</button>` : ``}
          </div>
        `;
        list.appendChild(div);
      }

      // edit
      list.querySelectorAll("button[data-edit]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const id = Number(btn.getAttribute("data-edit"));
          const review = data.find(x => x.id === id);
          if(review) setEditMode(true, review);
        });
      });

      // delete (admin)
      list.querySelectorAll("button[data-del]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const id = Number(btn.getAttribute("data-del"));
          if(!confirm("Supprimer cet avis ?")) return;
          const { error } = await supabase.from("reviews").delete().eq("id", id);
          if(error) alert("Erreur: " + error.message);
          await loadReviews();
        });
      });
    }

    loginBtn.addEventListener("click", async ()=>{
      await supabase.auth.signInWithOAuth({
        provider: "discord",
        options: {
          redirectTo: window.location.href.split("#")[0]
        }
      });
    });

    logoutBtn.addEventListener("click", async ()=>{
      await supabase.auth.signOut();
      setEditMode(false);
      await refreshSession();
      await loadReviews();
    });

    sendBtn.addEventListener("click", async ()=>{
      const meInfo = await getMe();
      if(!meInfo){
        alert("Connecte-toi avec Discord d’abord.");
        return;
      }

      const message = (messageEl.value || "").trim();
      if(message.length < 3){
        alert("Écris un message (au moins 3 caractères).");
        return;
      }

      const payload = {
        rating: ratingValue,
        message,
        discord_username: meInfo.username,
        discord_avatar_url: meInfo.avatar
      };

      if(editingId){
        const { error } = await supabase
          .from("reviews")
          .update(payload)
          .eq("id", editingId)
          .eq("user_id", meInfo.user.id);

        if(error){ alert("Erreur update: " + error.message); return; }
        setEditMode(false);
        await loadReviews();
        return;
      }

      const { error } = await supabase.from("reviews").insert({
        user_id: meInfo.user.id,
        ...payload
      });

      if(error){ alert("Erreur: " + error.message); return; }

      setEditMode(false);
      await loadReviews();
    });

    supabase.auth.onAuthStateChange(async ()=>{
      setEditMode(false);
      await refreshSession();
      await loadReviews();
    });

    await refreshSession();
    await loadReviews();
  </script>
</body>
</html>
